# Lefthook configuration — polyglot git hook runner.
# Installed automatically via `bun install` (postinstall: lefthook install).
# Run hooks manually: lefthook run <group>
# Skip hooks for a single command: LEFTHOOK=0 git commit
# CI: set LEFTHOOK=0 in the bun install step to suppress hook installation.

# ---------------------------------------------------------------------------
# PRE-COMMIT — fast, staged files only (parallel). Target: < 3s.
# ---------------------------------------------------------------------------
pre-commit:
  parallel: true
  jobs:
    - name: biome-check
      glob: "**/*.{ts,tsx,json}"
      run: bun biome check --write {staged_files}
      stage_fixed: true

    - name: clang-format-check
      glob: "**/*.{cc,h,mm}"
      run: |
        if ! command -v pixi >/dev/null 2>&1; then
          echo "⚠ clang-format skipped: pixi not installed. Run: curl -fsSL https://pixi.sh/install.sh | sh && pixi install"
          exit 0
        fi
        pixi run clang-format --dry-run --Werror {staged_files}
      fail_text: "C++ formatting violations found. Run `bun run fmt` to fix."

    - name: cargo-fmt-check
      glob: "**/*.rs"
      run: cargo fmt --check
      fail_text: "Rust formatting violations found. Run `cargo fmt` to fix."

# ---------------------------------------------------------------------------
# PRE-PUSH — slower, full project (sequential). Target: < 60s.
# ---------------------------------------------------------------------------
pre-push:
  parallel: false
  jobs:
    - name: tsc
      run: bun run --cwd web typecheck

    - name: clang-tidy
      run: |
        if [ ! -f build/compile_commands.json ]; then
          echo "⚠ clang-tidy skipped: build/compile_commands.json not found. Run: cmake -B build -DCRONYMAX_BUILD_APP=ON"
          exit 0
        fi
        if ! command -v pixi >/dev/null 2>&1; then
          echo "⚠ clang-tidy skipped: pixi not installed. Run: curl -fsSL https://pixi.sh/install.sh | sh && pixi install"
          exit 0
        fi
        CHANGED=$(git diff --name-only HEAD @{push} 2>/dev/null | grep -E '\.(cc|h|mm)$' || true)
        if [ -z "$CHANGED" ]; then
          echo "No C++ files changed — skipping clang-tidy."
          exit 0
        fi
        pixi run run-clang-tidy -p build $CHANGED

    - name: clippy
      run: cargo clippy -- --no-deps -D warnings

# ---------------------------------------------------------------------------
# FMT — manual full-project format (bun run fmt → lefthook run fmt).
# ---------------------------------------------------------------------------
fmt:
  parallel: true
  jobs:
    - name: biome-fmt
      run: bun biome format --write web/src

    - name: clang-format-fix
      run: |
        if ! command -v pixi >/dev/null 2>&1; then
          echo "⚠ clang-format skipped: pixi not installed. Run: curl -fsSL https://pixi.sh/install.sh | sh && pixi install"
          exit 0
        fi
        find app -name "*.cc" -o -name "*.h" -o -name "*.mm" | xargs pixi run clang-format -i

    - name: cargo-fmt
      run: cargo fmt

# ---------------------------------------------------------------------------
# LINT — manual lint-only check (bun run lint → lefthook run lint).
# ---------------------------------------------------------------------------
lint:
  parallel: true
  jobs:
    - name: biome-lint
      run: bun biome check web/src

    - name: clippy-check
      run: cargo clippy --workspace -D warnings
