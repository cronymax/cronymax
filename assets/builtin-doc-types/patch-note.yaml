name: patch-note
display_name: Patch Note
description: |
  A brief summary written by RD after addressing a bug report. Describes
  what was changed, which files were modified, and how QA should verify
  the fix. Sent back to QA to resume the test loop.
required_sections:
  - { heading: "What Changed", min_words: 20 }
  - { heading: "Files Modified", min_items: 1, kind: list }
  - { heading: "How to Verify", min_words: 15 }
optional_sections:
  - { heading: "Root Cause" }
  - { heading: "Follow-up Work" }
front_matter_required:
  - author
  - owner_agent
  - source_bug_report
