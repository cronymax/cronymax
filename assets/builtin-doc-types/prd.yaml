name: prd
display_name: Product Requirements Doc
description: |
  A short product spec describing the goal of a feature, the acceptance
  criteria a working implementation must meet, and the things explicitly
  out of scope.
required_sections:
  - { heading: "Goal", min_words: 20 }
  - { heading: "User", min_words: 10 }
  - { heading: "Acceptance Criteria", min_items: 1, kind: list }
  - { heading: "Non-Goals" }
optional_sections:
  - { heading: "Open Questions" }
  - { heading: "Risks" }
front_matter_required:
  - author
  - owner_agent
