name: tech-spec
display_name: Technical Specification
description: |
  Engineering design document. Captures the chosen approach, key decisions,
  the high-level architecture, and the testing/migration strategy. Written
  by the architect agent in response to an approved PRD.
required_sections:
  - { heading: "Summary", min_words: 30 }
  - { heading: "Approach", min_words: 50 }
  - { heading: "Key Decisions", min_items: 1, kind: list }
  - { heading: "Testing Strategy" }
optional_sections:
  - { heading: "Alternatives Considered" }
  - { heading: "Migration Plan" }
  - { heading: "Open Questions" }
front_matter_required:
  - author
  - owner_agent
  - source_prd
