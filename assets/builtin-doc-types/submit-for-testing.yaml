name: submit-for-testing
display_name: Submit for Testing
description: |
  A handoff document from RD to QA. Describes what was built, how to set
  up the test environment, what is in scope for this testing round, and
  any known limitations. QA uses this to plan and execute the test suite.
required_sections:
  - { heading: "What Was Built", min_words: 30 }
  - { heading: "Test Setup", min_words: 20 }
  - { heading: "In Scope", min_items: 1, kind: list }
  - { heading: "Known Limitations" }
optional_sections:
  - { heading: "Out of Scope" }
  - { heading: "Test Data" }
front_matter_required:
  - author
  - owner_agent
  - source_code_description
