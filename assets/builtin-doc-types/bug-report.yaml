name: bug-report
display_name: Bug Report
description: |
  A structured defect report produced by the QA agent after a failed test
  run. Contains exact reproduction steps, expected vs actual behaviour, and
  a severity rating. Sent back to RD to trigger a patch cycle.
required_sections:
  - { heading: "Steps to Reproduce", min_items: 1, kind: list }
  - { heading: "Expected", min_words: 10 }
  - { heading: "Actual", min_words: 10 }
  - { heading: "Severity", min_words: 3 }
optional_sections:
  - { heading: "Reproduction Rate" }
  - { heading: "Affected Tests" }
  - { heading: "Logs" }
front_matter_required:
  - author
  - owner_agent
