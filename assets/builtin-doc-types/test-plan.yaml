name: test-plan
display_name: Test Plan
description: |
  Verification plan for a feature. Lists test cases (unit, integration, E2E)
  with the scenarios they cover, plus any manual QA steps needed before ship.
required_sections:
  - { heading: "Scope", min_words: 20 }
  - { heading: "Test Cases", min_items: 1, kind: list }
  - { heading: "Manual QA Steps" }
optional_sections:
  - { heading: "Out of Scope" }
  - { heading: "Risks" }
front_matter_required:
  - author
  - owner_agent
  - source_spec
