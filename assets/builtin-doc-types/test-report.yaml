name: test-report
display_name: Test Report
description: |
  A final QA sign-off document summarising the test run results, remaining
  open bugs, and a ship recommendation. Requires human approval before the
  feature is considered released.
required_sections:
  - { heading: "Summary", min_words: 30 }
  - { heading: "Pass Rate", min_words: 5 }
  - { heading: "Open Bugs" }
  - { heading: "Ship Recommendation", min_words: 10 }
optional_sections:
  - { heading: "Test Coverage" }
  - { heading: "Performance Notes" }
  - { heading: "Follow-up Items" }
front_matter_required:
  - author
  - owner_agent
