# Test configuration for cronymax
[font]
family = "JetBrains Mono"
size = 16.0
line_height = 1.2

[colors]
foreground = "#d4d4d4"
background = "#1e1e1e"
cursor = "#ffffff"
selection_fg = "#ffffff"
selection_bg = "#264f78"
ansi = [
    "#000000", "#cd3131", "#0dbc79", "#e5e510",
    "#2472c8", "#bc3fbc", "#11a8cd", "#e5e5e5",
    "#666666", "#f14c4c", "#23d18b", "#f5f543",
    "#3b8eea", "#d670d6", "#29b8db", "#ffffff",
]

[terminal]
scrollback_lines = 5000
cursor_style = "beam"
cursor_blink = true

[[keybindings]]
key = "t"
modifiers = ["ctrl", "shift"]
action = "new_tab"

[webview]
default_url = "https://docs.rs"
